{% extends "base.html" %}
{% block content %}

<div class="create-wrapper">

    <div class="create-card">

        <h2>Edit Post</h2>
        <p class="create-sub">Update your content</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <input type="text"
                   name="title"
                   value="{{ post.title }}"
                   required>

            <textarea name="content"
                      rows="6"
                      required>{{ post.content }}</textarea>

            <button type="submit" class="publish-btn">
                ✅ Update Post
            </button>

        </form>

    </div>

</div>

{% endblock %}
