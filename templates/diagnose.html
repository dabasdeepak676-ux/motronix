{% extends "base.html" %}
{% block content %}

<div class="diagnose-container">

    <h1 class="hero-title">Motronix</h1>
    <p class="hero-sub">Automotive Intelligence Simplified</p>

    <div class="diagnose-card">

        <h2>Car Diagnose</h2>
        <h3>Motronix AI Brain V1 - Beta</h3>

        {% if default_car %}
        <p class="default-car">
            Default Car: {{ default_car.brand }} {{ default_car.model }}
        </p>
        {% endif %}

        <form method="POST">

            {% if cars %}
            <select name="car_id" required>
                {% for car in cars %}
                <option value="{{ car.id }}">
                    {{ car.brand }} {{ car.model }} ({{ car.year }})
                </option>
                {% endfor %}
            </select>
            {% endif %}

            <div class="autocomplete-wrapper">

                <input
                    type="text"
                    id="problem-input"
                    name="problem"
                    placeholder="Describe your problem"
                    autocomplete="off"
                    required
                >

                <div id="suggestions-box"></div>

            </div>

            <button type="submit">
                Diagnose Now
            </button>

        </form>

        <a href="/garage" class="my-cars-btn">
            My Cars
        </a>

    </div>

</div>

<script>

window.onload = function(){

const input = document.getElementById("problem-input");
const box = document.getElementById("suggestions-box");

input.addEventListener("input", function(){

let query = input.value.trim();

if(query.length < 2){
box.innerHTML = "";
return;
}

fetch("/symptom-suggest?q=" + encodeURIComponent(query))
.then(res => res.json())
.then(data => {

box.innerHTML = "";

data.suggestions.forEach(function(item){

let div = document.createElement("div");

div.className = "suggestion-item";

div.innerText = item;

div.onclick = function(){

input.value = item;

box.innerHTML = "";

};

box.appendChild(div);

});

});

});

}

</script>
<script>

console.log("Motronix autocomplete loaded");

const input = document.getElementById("problem-input");
const box = document.getElementById("suggestions-box");

if(input){

input.addEventListener("keyup", function(){

let query = input.value;

if(query.length < 2){
box.innerHTML="";
return;
}

fetch("/symptom-suggest?q=" + query)

.then(res => res.json())

.then(data => {

box.innerHTML="";

data.suggestions.forEach(function(item){

let div = document.createElement("div");

div.className="suggestion-item";

div.innerText=item;

div.onclick=function(){

input.value=item;
box.innerHTML="";

};

box.appendChild(div);

});

});

});

}

</script>

{% endblock %}
